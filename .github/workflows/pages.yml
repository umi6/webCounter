name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
        working-directory: ./webCounter
      - name: Build
        run: npm run build
        working-directory: ./webCounter
      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./webCounter/dist

      - name: Deploy to gh-pages branch (avoid deprecated upload-artifact)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./webCounter/dist
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
